services:
  rpanel:
    build: .
    image: rpanel:latest
    container_name: rpanel
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - /data/rpanel/source/.env
    volumes:
      - /data/rpanel/ssh:/app/ssh
      - /data/rpanel/applications:/app/applications
      - /data/rpanel/databases:/app/databases
      - /data/rpanel/backups:/app/backups
      - /data/rpanel/services:/app/services
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - rpanel-network
    depends_on:
      postgres:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: rpanel-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rpanel123}
      - POSTGRES_DB=rpanel
    volumes:
      - rpanel-postgres-data:/var/lib/postgresql/data
    networks:
      - rpanel-network

networks:
  rpanel-network:
    driver: bridge

volumes:
  rpanel-postgres-data:
