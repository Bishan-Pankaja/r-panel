services:
  traefik:
    image: traefik:v2.5
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=rpanel-network"
      - "--providers.docker.swarmMode=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - rpanel-network
      - dokploy-network

  rpanel:
    build: .
    image: rpanel:latest
    container_name: rpanel
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - /data/rpanel/source/.env
    volumes:
      - /data/rpanel/ssh:/app/ssh
      - /data/rpanel/applications:/app/applications
      - /data/rpanel/databases:/app/databases
      - /data/rpanel/backups:/app/backups
      - /data/rpanel/services:/app/services
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - rpanel-network
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      traefik:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: rpanel-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rpanel123}
      - POSTGRES_DB=rpanel
    volumes:
      - rpanel-postgres-data:/var/lib/postgresql/data
    networks:
      - rpanel-network

  redis:
    image: redis:7-alpine
    container_name: rpanel-redis
    restart: unless-stopped
    networks:
      - rpanel-network

networks:
  rpanel-network:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  rpanel-postgres-data:
