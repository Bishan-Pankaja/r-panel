version: '3.8'

services:
  rpanel:
    image: rpanel:latest
    container_name: rpanel
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - APP_ID=${APP_ID}
      - APP_KEY=${APP_KEY}
      - ROOT_USERNAME=${ROOT_USERNAME}
      - ROOT_USER_EMAIL=${ROOT_USER_EMAIL}
      - ROOT_USER_PASSWORD=${ROOT_USER_PASSWORD}
    volumes:
      - /data/rpanel/ssh:/app/ssh
      - /data/rpanel/applications:/app/applications
      - /data/rpanel/databases:/app/databases
      - /data/rpanel/backups:/app/backups
      - /data/rpanel/services:/app/services
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - rpanel-network

  postgres:
    image: postgres:16-alpine
    container_name: rpanel-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rpanel123}
      - POSTGRES_DB=rpanel
    volumes:
      - rpanel-postgres-data:/var/lib/postgresql/data
    networks:
      - rpanel-network

networks:
  rpanel-network:
    driver: bridge

volumes:
  rpanel-postgres-data:
